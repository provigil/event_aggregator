name: Bi-Monthly NYC Event Digest

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write  # Crucial for allowing the bot to save files

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 feedparser thefuzz python-Levenshtein

      - name: Run Scraper
        run: python nyc_events.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Automated NYC Event Update: $(date +'%Y-%m-%d')" || exit 0
          git push

name: Bi-Monthly NYC Event Digest

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write  # Crucial for allowing the bot to save files

env:
  # Optional: set a friendly user-agent for feed/API calls
  EVENT_DIGEST_USER_AGENT: "NYCEventDigestBot/1.0 (+contact:you@example.com)"
  LOG_LEVEL: "INFO"

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 feedparser thefuzz python-Levenshtein

      - name: Ensure README markers exist
        # Adds unique markers the script expects if they are missing.
        run: |
          START="<!-- NYC_EVENTS_START -->"
          END="<!-- NYC_EVENTS_END -->"
          if [ ! -f README.md ]; then
            printf "%s\n%s\n" "$START" "$END" > README.md
          else
            if ! grep -q "$START" README.md || ! grep -q "$END" README.md; then
              # Append markers at end of file (keeps existing content)
              printf "\n\n%s\n%s\n" "$START" "$END" >> README.md
            fi
          fi

      - name: Run Scraper
        # If you named the new script differently, change this line.
        run: python nyc_events.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Automated NYC Event Update: $(date +'%Y-%m-%d')" || exit 0
          git push
